<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>PKR Invoice | Ringshing POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; }
        .receipt-container { max-width: 80mm; padding: 5px; margin: 0 auto; background: white; font-family: monospace; font-size: 12px; }
        .dotted-line { border-top: 2px solid black; margin: 5px 0; }
        @media print { .no-print { display: none !important; } .receipt-container { display: block !important; width: 80mm !important; } }
    </style>
</head>
<body>
<div id="pin-lock-screen" class="fixed inset-0 bg-gray-900 bg-opacity-95 z-[9999] flex flex-col items-center justify-center print:hidden">
    <div class="bg-white p-8 rounded-xl shadow-2xl text-center max-w-sm w-full">
        <h2 class="text-2xl font-bold mb-4">System Locked</h2>
        <input type="password" id="pos-pin" placeholder="Enter PIN" class="w-full p-3 border rounded mb-4 text-center text-2xl tracking-widest">
        <button onclick="unlockSystem()" class="w-full bg-blue-600 text-white p-3 rounded font-bold">Unlock POS</button>
        <p id="pin-error" class="text-red-500 mt-3 hidden">Incorrect PIN</p>
    </div>
</div>

<div class="container mx-auto p-4 md:p-8 no-print">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-lg">
        <h1 class="text-2xl font-bold mb-4">New Invoice</h1>
        <div class="grid grid-cols-2 gap-4 mb-4">
            <input type="text" id="invoice-id" class="p-2 border rounded bg-gray-50" readonly>
            <input type="text" id="customer-name" placeholder="Customer Name" class="p-2 border rounded">
        </div>
        <div class="flex space-x-4 mb-4">
            <label><input type="radio" name="pay-method" value="Cash" checked> Cash</label>
            <label><input type="radio" name="pay-method" value="Card"> Card</label>
        </div>
        <div class="relative mb-4">
            <input type="text" id="product-search" placeholder="Search product..." class="w-full p-3 border-2 border-blue-100 rounded">
            <div id="results" class="absolute z-10 w-full bg-white border rounded hidden max-h-48 overflow-y-auto shadow-xl"></div>
        </div>
        <table class="w-full mb-4">
            <thead><tr class="border-b text-left text-sm"><th>Item</th><th>Qty</th><th>Total</th><th></th></tr></thead>
            <tbody id="cart-body"></tbody>
        </table>
        <div class="text-right font-bold text-xl mb-6">Total: <span id="grand-total">Rs 0</span></div>
        <button onclick="saveAndPrint()" class="w-full bg-purple-700 text-white py-4 rounded-xl text-xl font-bold">🖨️ Save & Print</button>
    </div>
</div>
<div id="print-area" class="receipt-container"></div>

<script type="module" src="firebase-db.js"></script>
<script src="productData.js"></script>
<script>
    let cart = [];
    async function unlockSystem() {
        const pin = document.getElementById('pos-pin').value;
        const ok = await window.loginWithPin(pin);
        if(ok) document.getElementById('pin-lock-screen').style.display = 'none';
        else document.getElementById('pin-error').classList.remove('hidden');
    }
    window.addEventListener('load', async () => {
        document.getElementById('invoice-id').value = localStorage.getItem('lastId') || 5874;
        if(await window.firebaseReady) document.getElementById('pin-lock-screen').style.display = 'none';
    });
    document.getElementById('product-search').addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        const res = document.getElementById('results');
        res.innerHTML = "";
        if(q.length < 2) return res.classList.add('hidden');
        productData.filter(p => p.title.toLowerCase().includes(q)).slice(0,5).forEach(p => {
            const div = document.createElement('div');
            div.className = "p-2 hover:bg-gray-100 cursor-pointer border-b";
            div.innerHTML = `<b>${p.title}</b> - Rs ${p.price}`;
            div.onclick = () => { cart.push({desc: p.title, price: p.price, qty: 1}); render(); res.classList.add('hidden'); };
            res.appendChild(div);
        });
        res.classList.remove('hidden');
    });
    function render() {
        const body = document.getElementById('cart-body');
        let total = 0;
        body.innerHTML = "";
        cart.forEach((item, i) => {
            let rowTotal = item.price * item.qty;
            total += rowTotal;
            body.innerHTML += `<tr class="border-b"><td>${item.desc}</td><td>${item.qty}</td><td>${rowTotal}</td><td><button onclick="cart.splice(${i},1);render()" class="text-red-500">X</button></td></tr>`;
        });
        document.getElementById('grand-total').innerText = "Rs " + total.toLocaleString();
        document.getElementById('print-area').innerHTML = `<div class="text-center"><b>RINGSHING</b><br>Invoice: ${document.getElementById('invoice-id').value}</div><div class="dotted-line"></div>` + 
            cart.map(i => `<div class="flex justify-between"><span>${i.desc}</span><span>${i.price * i.qty}</span></div>`).join('') + `<div class="dotted-line"></div><div class="text-right font-bold">TOTAL: Rs ${total}</div>`;
    }
    async function saveAndPrint() {
        if(cart.length === 0) return;
        const total = cart.reduce((a, b) => a + (b.price * b.qty), 0);
        const record = { id: document.getElementById('invoice-id').value, date: new Date().toISOString(), items: cart, total: total, payment: document.querySelector('input[name="pay-method"]:checked').value };
        if(window.saveInvoiceToCloud) await window.saveInvoiceToCloud(record);
        window.print();
        localStorage.setItem('lastId', parseInt(record.id) + 1);
        location.reload();
    }
</script>
</body>
</html>
