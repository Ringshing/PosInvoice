<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Analytics</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-100 p-8">
<div id="pin-lock-screen" class="fixed inset-0 bg-gray-900 bg-opacity-95 z-[9999] flex flex-col items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-2xl text-center max-w-sm w-full">
        <h2 class="text-2xl font-bold mb-4">System Locked</h2>
        <input type="password" id="pos-pin" placeholder="Enter PIN" class="w-full p-3 border rounded mb-4 text-center text-2xl tracking-widest">
        <button onclick="unlockSystem()" class="w-full bg-blue-600 text-white p-3 rounded font-bold">Unlock Analytics</button>
    </div>
</div>
<div class="max-w-4xl mx-auto">
    <div class="flex justify-between mb-8"><h1 class="text-2xl font-bold">📊 Cloud Analytics</h1><a href="index.html" class="bg-blue-600 text-white px-4 py-2 rounded">Home</a></div>
    <div class="grid grid-cols-2 gap-6 mb-8">
        <div class="bg-white p-6 rounded-lg shadow border-l-4 border-green-500"><h3 class="text-gray-500 text-sm">Total Sales</h3><p id="total-val" class="text-3xl font-bold">Rs 0</p></div>
        <div class="bg-white p-6 rounded-lg shadow border-l-4 border-blue-500"><h3 class="text-gray-500 text-sm">Invoices</h3><p id="count-val" class="text-3xl font-bold">0</p></div>
    </div>
    <button onclick="load()" class="w-full bg-gray-800 text-white py-2 rounded">↻ Sync Data</button>
</div>
<script type="module" src="firebase-db.js"></script>
<script>
    async function unlockSystem() {
        const ok = await window.loginWithPin(document.getElementById('pos-pin').value);
        if(ok) { document.getElementById('pin-lock-screen').style.display='none'; load(); }
    }
    window.addEventListener('load', async () => { if(await window.firebaseReady) { document.getElementById('pin-lock-screen').style.display='none'; load(); } });
    async function load() {
        if(!window.fetchStoreAnalytics) return;
        const data = await window.fetchStoreAnalytics();
        const total = data.sales.reduce((s, i) => s + (Number(i.total) || 0), 0);
        document.getElementById('total-val').innerText = "Rs " + total.toLocaleString();
        document.getElementById('count-val').innerText = data.sales.length;
    }
</script>
</body>
</html>
